development:
  cron: {}

test:
  cron: {}

production:
  clear_finished_jobs:
    command: "GoodJob.cleanup_preserved_jobs(older_than: 14.days)"
    schedule: every hour at minute 12
    description: Clean up preserved GoodJob records

  metrics_rollups_hourly:
    class: Metrics::Rollups::MetricsRollupJob
    schedule: every hour at minute 58
    set:
      queue: metrics
    description: Roll up API and search metrics every hour

  metrics_rollups_daily:
    class: Metrics::Rollups::MetricsRollupJob
    kwargs:
      period: day
    schedule: at 1:00am every day
    set:
      queue: metrics
    description: Run daily metrics rollups

  metrics_retention_daily:
    class: Metrics::Rollups::MetricsRetentionJob
    schedule: at 1:00am every day
    set:
      queue: metrics
    description: Apply retention policy to raw metrics and rollups