#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  metrics_rollups_hourly:
    class: Metrics::Rollups::MetricsRollupJob
    queue: metrics
    schedule: every hour at minute 58

  metrics_rollups_daily:
    command: "Metrics::Rollups::MetricsRollupJob.perform_later(period: 'day')"
    schedule: at 1:00am every day

  metrics_retention_daily:
    class: Metrics::Rollups::MetricsRetentionJob
    queue: metrics
    schedule: at 1:00am every day
